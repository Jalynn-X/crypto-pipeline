version: 2

models:
  - name: silver_prices
    description: "Cleaned and typed crypto price records"
    columns:
      - name: pair
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['XBTUSD', 'ETHUSD']
      - name: price
        tests:
          - not_null
      - name: ingested_at
        tests:
          - not_null
      - name: event_date
        tests:
          - not_null

  - name: gold_alerts
    description: "Price alerts based on 5-min percent change"
    columns:
      - name: alert_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['DROP', 'SPIKE']
