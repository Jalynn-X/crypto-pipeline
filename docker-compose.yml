version: "3.8"

services:
  redpanda:
    image: redpandadata/redpanda:v25.3.9
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "1"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    restart: always

  producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: crypto-producer
    depends_on:
      - redpanda
    environment:
      - INTERVAL=60
      - KAFKA_SERVER=redpanda:29092 
    restart: always

  jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    volumes:
      - ./src:/opt/src
      - ~/.config/gcloud:/root/.config/gcloud:ro
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/opt/credentials/credentials.json:ro
    command: jobmanager
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/credentials/credentials.json
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCS_BUCKET=${GCS_BUCKET}
      - GCS_CHECKPOINT_PATH=${GCS_CHECKPOINT_PATH}
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
    restart: always

  taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: flink-taskmanager
    depends_on:
      - jobmanager
    volumes:
      - ./src:/opt/src
      - ~/.config/gcloud:/root/.config/gcloud:ro
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/opt/credentials/credentials.json:ro
    command: taskmanager
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/credentials/credentials.json
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCS_BUCKET=${GCS_BUCKET}
      - GCS_CHECKPOINT_PATH=${GCS_CHECKPOINT_PATH}
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
    restart: always

  flink-submitter:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: flink-submitter
    depends_on:
      - jobmanager
    volumes:
      - ./src:/opt/src
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/opt/credentials/credentials.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/credentials/credentials.json
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCS_BUCKET=${GCS_BUCKET}
      - GCS_CHECKPOINT_PATH=${GCS_CHECKPOINT_PATH}
    entrypoint: /opt/flink/bin/flink run -m jobmanager:8081 -py /opt/src/job/crypto_ingest.py

  kestra-db:
    image: postgres:15
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra_password

kestra:
    image: kestra/kestra:latest
    container_name: kestra
    depends_on:
      - kestra-db
    command: server standalone
    ports:
      - "8080:8080"
    env_file: 
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - kestra_storage:/app/storage
    environment:
      KESTRA_CONFIGURATION: |
        kestra:
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: local
          variables:
            envs:
              gcp_project_id: "${GCP_PROJECT_ID}"
              gcs_bucket: "${GCS_BUCKET}"
    restart: always

volumes:
  redpanda_data:
  kestra_storage:
  kestra_db_data: